{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>UniRide Sign Up</title>
    <link rel="stylesheet" href="{% static 'home/style.css' %}">
</head>
<body>

    <h2>UniRide - Sign Up</h2>
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Enter user name :</label><br>
        <input type="text" name="username" required><br><br>

        <label>Enter First name :</label><br>
        <input type="text" name="first_name" required><br><br>

        <label>Enter Last name :</label><br>
        <input type="text" name="last_name" required><br><br>

        <label>University ID:</label><br>
        <input type="text" name="university_id" required><br><br>

        <label>College Name:</label><br>
        <input type="text" name="college_name" required><br><br>

        <label>Branch Name:</label><br>
        <input type="text" name="branch_name" required><br><br>

        <label>Personal Address:</label><br>
        <input type="text" name="personal_address" required><br><br>

        <label>Enter Phone number:</label><br>
        <input type="tel" name="phone_number" pattern="[0-9]{10}" 
required><br><br>

        <label>College Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Enter Current Year:</label><br>
        <input type="number" min="1" max="5" name="year" required><br><br>

        <label>Enter Current Semester:</label><br>
        <input type="number" min="1" max="10" name="Semester" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <label>Confirm Password:</label><br>
        <input type="password" name="confirm_password" required><br><br>

        <button type="submit">Create Account</button>

    </form>

    <p>Already have an account?
    <a href="{% url 'login' %}"> Login </a> </p>

</body>
</html>
